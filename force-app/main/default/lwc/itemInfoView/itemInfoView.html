<template>
  <div class="item-info-main-container">
    <!-- Left column: Product Data -->
    <div class="item-info-first-panel slds-grid slds-grid_vertical" data-id="product-data">
      <template if:true={dataManager.isLoadingData}>
        <p>Haetaan tuotteen tietoja...</p>
      </template>
      <template if:true={dataManager.hasError}>
        <p>Virhe ladattaessa tuotetta.</p>
        <p>{dataManager.errorMessage}</p>
      </template>

      <!-- Product Data -->
      <template if:true={hasProductData}>
        <template for:each={productData} for:item="pData">
          <div key={pData.title} class="item-info-box">
            <p class="slds-text-title">{pData.title}:</p>
            <lightning-formatted-rich-text value={pData.value}></lightning-formatted-rich-text>
          </div>
        </template>
      </template>
    </div>
    <!-- Right column: Image + Nutrients -->
    <div class="item-info-second-panel" data-id="product-right-rail">
      <!-- Product Image -->
      <template lwc:if={productImageUrl}>
        <img class="item-info-image" width={imageWidth} height={imageHeight} decoding="async" loading="eager" style="color:transparent" src={productImageUrl}>
      </template>

      <!-- Product Nutrients -->
      <template if:true={hasProductNutrients}>
        <div class="item-info-nutrient-box">
          <p class="slds-text-title item-info-nutrient-title">Ravintosisältö:</p>
          <lightning-formatted-rich-text class="item-info-nutrient-value" value={productNutrientsReferenceQuantity}></lightning-formatted-rich-text>
        </div>
        <template for:each={productNutrients} for:item="pNutrient">
          <div key={pNutrient.title} class="item-info-nutrient-box">
            <p class="slds-text-title item-info-nutrient-title">{pNutrient.title}:</p>
            <lightning-formatted-rich-text class="item-info-nutrient-value" value={pNutrient.value}></lightning-formatted-rich-text>
          </div>
        </template>
      </template>
    </div>
  </div>
</template>
