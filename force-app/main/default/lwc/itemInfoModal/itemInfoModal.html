<template>
  <header class="slds-modal__header">
    <h2 class="slds-text-heading_medium">{modalTitle}</h2>
  </header>
  <div class="slds-modal__content modal-content">
    <div class="slds-p-around_medium modal-scrollable">
      <template if:true={item.adSpaceSpecification}>
        <h2 class="slds-text-heading_medium">{adSpaceSpecTitle}</h2>
        <c-ad-space-specification-info-view ad-space-specification={item.adSpaceSpecification} record-id={adSpaceSpecificationRecordId} in-english={inEnglish}></c-ad-space-specification-info-view>
      </template>
      <h2 class="slds-text-heading_medium">{productDetailsTitle}</h2>
      <c-item-info-view ean-code={eanCode} details-to-show={detailsToShow} in-english={inEnglish}> </c-item-info-view>
    </div>
  </div>
  <footer class="slds-modal__footer">
    <lightning-button variant="neutral" label={closeButtonLabelText} onclick={handleClose}></lightning-button>
  </footer>
</template>
