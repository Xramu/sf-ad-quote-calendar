<template>
  <header class="slds-modal__header">
    <h2 class="slds-text-heading_medium">{modalTitle}</h2>
  </header>
  <div class="slds-p-around_medium slds-modal__content modal-content">
    <div class="">
      <template if:true={item.adSpaceSpecification}>
        <c-ad-space-specification-info-view ad-space-specification={item.adSpaceSpecification}></c-ad-space-specification-info-view>
        <div class="slds-p-bottom_medium"></div>
      </template>
      <c-item-info-view ean-code={eanCode} details-to-show={detailsToShow}> </c-item-info-view>
    </div>
  </div>
  <footer class="slds-modal__footer">
    <lightning-button variant="neutral" label="Sulje" onclick={handleClose}></lightning-button>
  </footer>
</template>
